services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: adk
      POSTGRES_PASSWORD: adk
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adk"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: adk
      POSTGRES_PWD: adk
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://adk:adk@postgresql:5432/adk_studio
      ADK_SESSION_DB: postgresql://adk:adk@postgresql:5432/adk_sessions
      TEMPORAL_ADDRESS: temporal:7233
      GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CORS_ORIGINS: "http://localhost:5173"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/agents:/app/agents

  temporal-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    depends_on:
      temporal:
        condition: service_started
      postgresql:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DATABASE_URL: postgresql+asyncpg://adk:adk@postgresql:5432/adk_studio
      ADK_SESSION_DB: postgresql://adk:adk@postgresql:5432/adk_sessions
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    volumes:
      - ./backend/src:/app/src
      - ./backend/agents:/app/agents

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: "http://backend:8000"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html

volumes:
  pgdata:
